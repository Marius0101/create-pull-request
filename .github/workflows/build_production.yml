name: Build production
on:
  workflow_call:
  workflow_dispatch:
jobs:
    Build_prod:
        runs-on: ubuntu-latest
        steps:
        - name: Checkout
          uses: actions/checkout@v4
            
        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version-file: .node-version
            cache: npm
        
        - name: Install Dependencies
          run: npm ci
        
        - name: Build and lint
          run: npm run build --omit=dev
